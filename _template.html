<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>聚酰亚胺实验室管理系统 · 方案 v1.1</title>
<style>
  :root{
    --green:#1AAD19; --green-d:#0e8a13; --green-l:#eaf7ea;
    --red:#FA5151; --orange:#FA9D3B; --blue:#10AEFF;
    --ink:#1f2329; --ink-2:#5b6168; --line:#e6e8eb; --bg:#f5f6f7; --card:#fff;
    --mono:"SFMono-Regular",Consolas,"Cascadia Code","Liberation Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.7;font-size:15px}
  /* top bar */
  header.top{position:sticky;top:0;z-index:20;background:linear-gradient(100deg,var(--green),var(--green-d));
    color:#fff;padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  header.top h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.5px}
  header.top .badge{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);
    padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}
  header.top .meta{margin-left:auto;font-size:12px;opacity:.92}
  /* layout */
  .wrap{display:flex;align-items:flex-start;max-width:1320px;margin:0 auto}
  nav.toc{position:sticky;top:54px;align-self:flex-start;width:270px;flex:0 0 270px;
    height:calc(100vh - 54px);overflow-y:auto;padding:18px 10px 40px 18px;font-size:13px;border-right:1px solid var(--line)}
  nav.toc a{display:block;color:var(--ink-2);text-decoration:none;padding:5px 10px;border-radius:7px;margin:1px 0;
    border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  nav.toc a:hover{background:var(--green-l);color:var(--green-d)}
  nav.toc a.toc-h1{font-weight:700;color:var(--ink);margin-top:12px;font-size:13.5px}
  nav.toc a.toc-h2{padding-left:18px}
  nav.toc a.active{background:var(--green-l);color:var(--green-d);border-left-color:var(--green);font-weight:600}
  main{flex:1 1 auto;min-width:0;padding:30px 46px 90px;background:var(--card);
    border-radius:0;box-shadow:0 1px 0 var(--line)}
  .content{max-width:880px;margin:0 auto}
  /* typography */
  .content h1{font-size:27px;margin:46px 0 8px;padding:14px 0 10px;border-bottom:3px solid var(--green);color:var(--green-d)}
  .content h1:first-child{margin-top:0}
  .content h2{font-size:21px;margin:38px 0 12px;padding-left:12px;border-left:5px solid var(--green);color:#15330f}
  .content h3{font-size:17px;margin:26px 0 8px;color:#222}
  .content h4{font-size:15px;margin:18px 0 6px;color:var(--ink-2)}
  .content p{margin:10px 0}
  .content a{color:var(--green-d)}
  .content ul,.content ol{padding-left:24px;margin:8px 0}
  .content li{margin:4px 0}
  .content strong{color:#111}
  /* tables */
  .content table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;display:block;overflow-x:auto}
  .content th,.content td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .content thead th{background:var(--green-l);color:var(--green-d);font-weight:700;white-space:nowrap}
  .content tbody tr:nth-child(even){background:#fafbfa}
  /* code & diagrams */
  .content code{background:#eef1f0;color:#b7106d;padding:1.5px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px}
  .content pre{background:#0f1b1f;color:#d6e2dd;padding:16px 18px;border-radius:10px;overflow-x:auto;
    line-height:1.5;margin:14px 0;border:1px solid #16323a}
  .content pre code{background:none;color:inherit;padding:0;font-size:12.5px;white-space:pre}
  /* blockquote = callout */
  .content blockquote{margin:14px 0;padding:12px 16px;background:var(--green-l);
    border-left:5px solid var(--green);border-radius:0 8px 8px 0;color:#24402a}
  .content blockquote p{margin:6px 0}
  .content blockquote code{background:#dff0df}
  /* misc */
  .content hr{border:none;border-top:1px dashed var(--line);margin:34px 0}
  .totop{position:fixed;right:22px;bottom:22px;background:var(--green);color:#fff;border:none;
    width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;transition:.2s;z-index:30}
  .totop.show{opacity:.9}
  @media(max-width:900px){
    .wrap{flex-direction:column}
    nav.toc{position:static;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    main{padding:20px}
  }
  @media print{
    header.top,nav.toc,.totop{display:none!important}
    main{box-shadow:none;padding:0}
    .content pre{background:#f6f8fa;color:#111;border:1px solid #ddd}
  }
</style>
</head>
<body>
<header class="top">
  <h1>聚酰亚胺材料实验室管理系统</h1>
  <span class="badge">方案 优化版 v1.1</span>
  <span class="meta">编制 2026-06-03 · 1人 + AI 协作开发 · 微信小程序 + 云开发</span>
</header>
<div class="wrap">
  <nav class="toc" id="toc"></nav>
  <main><div class="content" id="content">正在渲染…</div></main>
</div>
<button class="totop" id="totop" title="回到顶部">↑</button>

<script id="doc" type="text/markdown">@@MARKDOWN@@</script>
<script>@@MARKEDJS@@</script>
<script>
(function(){
  var src = document.getElementById('doc').textContent;
  if (window.marked) {
    try { marked.setOptions({ gfm:true, breaks:false }); } catch(e){}
    var html = (marked.parse ? marked.parse(src) : marked(src));
    document.getElementById('content').innerHTML = html;
  } else {
    document.getElementById('content').innerHTML = '<pre>'+src.replace(/</g,'&lt;')+'</pre>';
  }
  // build TOC from h1/h2
  var toc = document.getElementById('toc');
  var heads = document.querySelectorAll('#content h1, #content h2');
  var i = 0, links = [], map = {};
  heads.forEach(function(h){
    var id = 'sec-' + (i++);
    h.id = id;
    var a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent.replace(/\s+/g,' ').trim();
    a.className = (h.tagName === 'H1') ? 'toc-h1' : 'toc-h2';
    a.addEventListener('click', function(e){
      e.preventDefault();
      document.getElementById(id).scrollIntoView({behavior:'smooth', block:'start'});
    });
    toc.appendChild(a);
    links.push(a); map[id] = a;
  });
  // scrollspy
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting) {
          links.forEach(function(l){ l.classList.remove('active'); });
          if (map[en.target.id]) {
            map[en.target.id].classList.add('active');
            map[en.target.id].scrollIntoView({block:'nearest'});
          }
        }
      });
    }, { rootMargin: '0px 0px -82% 0px', threshold: 0 });
    heads.forEach(function(h){ obs.observe(h); });
  }
  // back to top
  var btn = document.getElementById('totop');
  btn.addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });
  window.addEventListener('scroll', function(){
    if (window.scrollY > 500) btn.classList.add('show'); else btn.classList.remove('show');
  });
})();
</script>
</body>
</html>
